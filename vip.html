<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--primary:#00ffd5;
--secondary:#00a2ff;
--gold:#ffd700;
--dark:#020617;
--card:rgba(10,15,30,0.72);

body{

background:
linear-gradient(rgba(2,6,23,0.88),rgba(2,6,23,0.92)),
url('https://images.unsplash.com/photo-1513828583688-c52646db42da?q=80&w=2070&auto=format&fit=crop');

background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
min-height:100vh;
overflow-x:hidden;
position:relative;

}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,
rgba(0,255,213,0.12),

radial-gradient(circle at bottom left,

.container{

.header{

align-items:center;

linear-gradient(
135deg,

0 10px 25px rgba(0,0,0,0.25),
0 0 20px rgba(0,255,213,0.08);

}
.hero{

background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
border-radius:35px;
padding:45px 35px;
position:relative;
overflow:hidden;
box-shadow:
0 20px 50px rgba(0,0,0,0.4),
0 0 40px rgba(0,255,213,0.08);

}

.hero::before{
content:'';
position:absolute;
top:-150px;
right:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(0,255,213,0.25),
transparent 70%);
}

.hero::after{
content:'';
position:absolute;
bottom:-150px;
left:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(0,162,255,0.2),
transparent 70%);
}

.logo{
font-size:58px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#fff,#00ffd5);

-webkit-text-fill-color:transparent;

}

.subtitle{
margin-top:12px;
color:#cbd5e1;
font-size:16px;

z-index:2;

.hero-line{
width:140px;
height:5px;
margin:25px auto 0;
border-radius:20px;
background:linear-gradient(90deg,#00ffd5,#00a2ff);

z-index:2;

.topbar{
display:flex;
gap:20px;
margin:30px 0;
flex-wrap:wrap;
position:sticky;

}

.search-box{
flex:1;
min-width:320px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
padding:22px 28px;
border-radius:28px;
display:flex;
align-items:center;
gap:15px;

}

.search-box span{
font-size:24px;
color:#00ffd5;
}

.search-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:16px;
}

.search-box input::placeholder{
color:#94a3b8;
}

.stat{

background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
padding:22px 28px;
border-radius:28px;
display:flex;
align-items:center;
font-weight:600;
color:#e2e8f0;
box-shadow:0 15px 35px rgba(0,0,0,0.25);

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
gap:28px;
}

.card{

background:rgba(10,15,30,0.72);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.08);
border-radius:35px;
padding:28px;
position:relative;
overflow:hidden;
transition:0.4s;
cursor:pointer;
box-shadow:
0 15px 40px rgba(0,0,0,0.35);

}

.card:hover{

transform:
translateY(-10px)
scale(1.01);

border-color:rgba(0,255,213,0.4);

box-shadow:
0 25px 60px rgba(0,0,0,0.45),
0 0 40px rgba(0,255,213,0.15);

}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
rgba(255,255,255,0.05),
transparent 40%
);
pointer-events:none;
}

.card::after{
content:'';
position:absolute;
top:-70px;
right:-70px;
width:180px;
height:180px;
background:
radial-gradient(circle,
rgba(0,255,213,0.16),
transparent 70%);
}

.company{
font-size:24px;
font-weight:700;
line-height:1.4;
margin-bottom:18px;
position:relative;
z-index:2;
}

.company::after{
content:'';
display:block;
width:90px;
height:4px;
margin-top:12px;
border-radius:20px;
background:linear-gradient(90deg,#00ffd5,transparent);
}

.row{
margin-bottom:12px;
line-height:1.7;
font-size:14px;
word-break:break-word;
position:relative;
z-index:2;
color:#dbeafe;
}

.label{
color:#00ffd5;
font-weight:600;
}

.pagination{
display:flex;
justify-content:center;
gap:12px;
margin-top:45px;
flex-wrap:wrap;
}

.btn{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
color:white;
padding:13px 18px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
}

.btn:hover,
.active{
background:linear-gradient(135deg,#00ffd5,#00a2ff);
color:black;
font-weight:700;
box-shadow:0 0 30px rgba(0,255,213,0.25);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.88);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:99999;
}

.modal-content{
width:100%;
max-width:1300px;
max-height:92vh;
overflow:auto;
background:
linear-gradient(
180deg,
rgba(15,23,42,0.95),
rgba(2,6,23,0.96)
);
border-radius:35px;
padding:35px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
position:relative;
box-shadow:
0 25px 60px rgba(0,0,0,0.5);
}

.close{
position:absolute;
top:18px;
right:28px;
font-size:40px;
color:#ff4d4d;
cursor:pointer;
transition:0.3s;
}

.close:hover{
transform:rotate(90deg);
}

.section{
margin-top:35px;
}

.section-title{
font-size:24px;
margin-bottom:18px;
color:#00ffd5;
font-weight:700;
}

.box{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
padding:22px;
border-radius:24px;
margin-bottom:18px;
line-height:1.8;
backdrop-filter:blur(10px);
}

.loading{
text-align:center;
padding:120px 20px;
font-size:22px;
color:#cbd5e1;
}

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-thumb{
background:linear-gradient(#00ffd5,#00a2ff);
border-radius:20px;
}

@media(max-width:768px){

.logo{
font-size:36px;
}

.subtitle{
font-size:13px;
letter-spacing:2px;
}

.grid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
}

.hero{

}

}

</style>
</head>

<body>

<div class="container">

<div class="header">

<div class="hero">

<div class="logo">
XMINE CLOUD
</div>

<div class="subtitle">
MINERBA INTELLIGENCE • CORPORATE DATABASE • ENTERPRISE SEARCH
</div>

<div class="hero-line"></div>

</div>

</div

</div>

</div>

<div class="topbar">

<div class="search-box">
🔍
<input type="text"
id="search"
placeholder="Cari perusahaan, direktur, email, NIB, izin, saham ...">
</div>

<div class="stat" id="stat">
Loading database...
</div>

</div>

<div class="grid" id="grid">

<div class="loading">
Loading database...
</div>

</div>

<div class="pagination" id="pagination"></div>

</div>

<div class="modal" id="modal">

<div class="modal-content">

<div class="close" onclick="closeModal()">×</div>

<div id="detail"></div>

</div>

</div>

<script>

const DATABASE_URL =
'https://raw.githubusercontent.com/XMINETRADER/cms-travel/refs/heads/main/database_minerba_lengkap.json?token=GHSAT0AAAAAAD32BW5UEGZ37GO7XYW4L4PY2QPFGIQ';

let DATABASE = [];
let FILTERED = [];

const PER_PAGE = 20;
let CURRENT_PAGE = 1;

async function loadDatabase(){

try{

const res = await fetch(DATABASE_URL);

const raw = await res.json();

if(Array.isArray(raw)){

DATABASE = raw;

}else if(raw.data){

DATABASE = raw.data;

}else{

DATABASE = Object.values(raw);

}

FILTERED = DATABASE;

document.getElementById('stat').innerHTML =
'TOTAL DATABASE : ' + DATABASE.length;

render();

}catch(err){

console.log(err);

document.getElementById('grid').innerHTML = `
<div class="loading">
❌ GAGAL LOAD DATABASE
<br><br>
${err}
</div>
`;

}

}

function val(v){

if(v === null || v === undefined || v === ''){
return '-';
}

return v;

}

function render(){

const start = (CURRENT_PAGE - 1) * PER_PAGE;

const end = start + PER_PAGE;

const data = FILTERED.slice(start,end);

const grid = document.getElementById('grid');

grid.innerHTML = '';

if(data.length === 0){

grid.innerHTML = `
<div class="loading">
DATA TIDAK DITEMUKAN
</div>
`;

return;

}

data.forEach(item=>{

let direktur = '-';

if(item.direksi?.length){

direktur = item.direksi
.map(x=>x.nama_direksi)
.join(', ');

}

const card = document.createElement('div');

card.className = 'card';

card.innerHTML = `

<div class="company">
${val(item.nama_badan_usaha)}
</div>

<div class="row">
<div class="icon"><span class="label">Jenis Izin 🏢</span><br>${val(item.jenis_perizinan)}</div></div>

<div class="row">
<div class="icon"><span class="label">NIB 🪪</span><br>${val(item.nib)}</div></div>

<div class="row">
<div class="icon">
<span class="label">Email 📧</span><br>${val(item.email)}</div></div>

<div class="row">
<div class="icon"><span class="label">Telepon 📞</span><br>${val(item.no_telp)}</div></div>

<div class="row">
<div class="icon"><span class="label">Direksi ‍👨‍💼</span><br>${direktur}</div></div>

<div class="row">
<div class="icon"><span class="label">Alamat 📍</span><br>${val(item.alamat)}</div></div>

`;

card.onclick = ()=>showDetail(item);

grid.appendChild(card);

});

renderPagination();

}

function renderPagination(){

const totalPages =
Math.ceil(FILTERED.length / PER_PAGE);

const pagination =
document.getElementById('pagination');

pagination.innerHTML = '';

for(let i=1;i<=totalPages;i++){

if(i > 10 && i !== totalPages &&
Math.abs(i - CURRENT_PAGE) > 2){
continue;
}

const btn = document.createElement('button');

btn.className =
'btn ' + (i === CURRENT_PAGE ? 'active' : '');

btn.innerText = i;

btn.onclick = ()=>{

CURRENT_PAGE = i;

render();

window.scrollTo({
top:0,
behavior:'smooth'
});

};

pagination.appendChild(btn);

}

}

function showDetail(item){

let direksi = '';

(item.direksi || []).forEach(x=>{

direksi += `
<div class="box">
<b>👨‍💼 ${val(x.nama_direksi)}</b>
<br>
👨‍💼 Jabatan :
${val(x.jabatan?.nama_jabatan)}
</div>
`;

});

let saham = '';

(item.pemegang_saham || []).forEach(x=>{

saham += `
<div class="box">
<b>${val(x.nama_pemegang_saham)}</b>
<br>
📊 Persentase :
${val(x.persentase_saham)}%
<br>
🌍 Negara :
${val(x.negara)}
</div>
`;

});

let izin = '';

(item.daftar_izin || []).forEach(x=>{

izin += `
<div class="box">
📞 Nomor :
${val(x.nomor_izin)}
<br>
⛏️ Komoditas :
${val(x.komoditas?.nama_komoditas)}
<br>
📍 Lokasi :
${val(x.lokasi_perizinan)}
<br>
📊 Status :
${val(x.status_cnc?.status_cnc)}
</div>
`;

});

document.getElementById('detail').innerHTML = `

<h1 style="color:#00ffd5;margin-bottom:20px;">
⚖️ ${val(item.nama_badan_usaha)}
</h1>

<div class="section">

<div class="section-title">
<div class="section-icon">🏢 </div>
<div>INFORMASI PERUSAHAAN</div>
</div>

<div class="box">

🏢 Jenis Badan Usaha :
${val(item.jenis_badan_usaha?.jenis_badan_usaha)}

<br><br>

🛰 NIB :
${val(item.nib)}

<br><br>

🧾 NPWP :
${val(item.npwp_badan_usaha)}

<br><br>

📧 Email :
${val(item.email)}

<br><br>

📞 Telepon :
${val(item.no_telp)}

<br><br>

📍 Alamat :
${val(item.alamat)}

</div>

</div>

<div class="section">

<div class="section-title">
<div class="section-icon">👨‍💼</div>
<div>DIREKSI</div>
</div>

${direksi || '<div class="box">Tidak ada data</div>'}

</div>

<div class="section">

<div class="section-title">
<div class="section-icon">💰</div>
<div>PEMEGANG SAHAM</div>
</div>

${saham || '<div class="box">Tidak ada data</div>'}

</div>

<div class="section">

<div class="section-title">
<div class="section-icon">📜</div>
<div>DAFTAR IZIN</div>
</div>

${izin || '<div class="box">Tidak ada data</div>'}

</div>

`;

document.getElementById('modal').style.display =
'flex';

}

function closeModal(){

document.getElementById('modal').style.display =
'none';

}

document.getElementById('search')
.addEventListener('input',function(){

const keyword =
this.value.toLowerCase().trim();

if(keyword === ''){

FILTERED = DATABASE;

}else{

FILTERED = DATABASE.filter(x=>{

return (

(x.nama_badan_usaha || '')
.toLowerCase()
.includes(keyword)

||

(x.nib || '')
.toLowerCase()
.includes(keyword)

||

(x.email || '')
.toLowerCase()
.includes(keyword)

||

(x.no_telp || '')
.toLowerCase()
.includes(keyword)

||

JSON.stringify(x.direksi || [])
.toLowerCase()
.includes(keyword)

||

JSON.stringify(x.pemegang_saham || [])
.toLowerCase()
.includes(keyword)

||

JSON.stringify(x.daftar_izin || [])
.toLowerCase()
.includes(keyword)

);

});

}

CURRENT_PAGE = 1;

document.getElementById('stat').innerHTML =
'HASIL : ' + FILTERED.length;

render();

});

window.onclick = function(e){

if(e.target.id === 'modal'){
closeModal();
}

}

loadDatabase();

</script>

</body>
</html>
