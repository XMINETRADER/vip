<title>XMINETRADER MINERBA PRO ENGINE</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">


<style>

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

:root{
--primary:#00ffd5;
--secondary:#00a2ff;
--gold:#ffd700;
--dark:#020617;
--card:rgba(10,15,30,0.72);
--border:rgba(255,255,255,0.08);
--text:#ffffff;
--muted:#94a3b8;
}

body{

background:
linear-gradient(rgba(2,6,23,0.88),rgba(2,6,23,0.92)),
url('https://images.unsplash.com/photo-1513828583688-c52646db42da?q=80&w=2070&auto=format&fit=crop');

background-size:cover;
background-position:center;
background-attachment:fixed;
color:white;
min-height:100vh;
overflow-x:hidden;
position:relative;

}

body::before{
content:'';
position:fixed;
inset:0;
background:
radial-gradient(circle at top right,
rgba(0,255,213,0.12),
transparent 35%),
radial-gradient(circle at bottom left,
rgba(0,162,255,0.12),
transparent 35%);
pointer-events:none;
z-index:0;
}

.container{
width:95%;
max-width:1700px;
margin:auto;
padding:35px 0 60px;
position:relative;
z-index:2;
}

.header{
text-align:center;
margin-bottom:40px;
}

.section-title{

display:flex;
align-items:center;
gap:14px;

font-size:24px;
font-weight:700;

margin-bottom:20px;

color:#00ffd5;

}

.section-icon{

width:52px;
height:52px;

border-radius:18px;

display:flex;
align-items:center;
justify-content:center;

font-size:24px;

background:
linear-gradient(
135deg,
rgba(0,255,213,0.18),
rgba(0,162,255,0.15)
);

border:1px solid rgba(255,255,255,0.08);

backdrop-filter:blur(12px);

box-shadow:
0 10px 25px rgba(0,0,0,0.25),
0 0 20px rgba(0,255,213,0.08);

}
.hero{

background:rgba(0,0,0,0.35);
backdrop-filter:blur(18px);
border:1px solid rgba(255,255,255,0.08);
border-radius:35px;
padding:45px 35px;
position:relative;
overflow:hidden;
box-shadow:
0 20px 50px rgba(0,0,0,0.4),
0 0 40px rgba(0,255,213,0.08);

}

.hero::before{
content:'';
position:absolute;
top:-150px;
right:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(0,255,213,0.25),
transparent 70%);
}

.hero::after{
content:'';
position:absolute;
bottom:-150px;
left:-150px;
width:320px;
height:320px;
background:radial-gradient(circle,
rgba(0,162,255,0.2),
transparent 70%);
}

.logo{
font-size:58px;
font-weight:800;
letter-spacing:2px;
background:linear-gradient(90deg,#fff,#00ffd5);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
position:relative;
z-index:2;
}

.subtitle{
margin-top:12px;
color:#cbd5e1;
font-size:16px;
letter-spacing:4px;
position:relative;
z-index:2;
}

.hero-line{
width:140px;
height:5px;
margin:25px auto 0;
border-radius:20px;
background:linear-gradient(90deg,#00ffd5,#00a2ff);
position:relative;
z-index:2;
}

.topbar{
display:flex;
gap:20px;
margin:30px 0;
flex-wrap:wrap;
position:sticky;
top:15px;
z-index:999;
}

.search-box{
flex:1;
min-width:320px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
padding:22px 28px;
border-radius:28px;
display:flex;
align-items:center;
gap:15px;
box-shadow:0 15px 35px rgba(0,0,0,0.25);
}

.search-box span{
font-size:24px;
color:#00ffd5;
}

.search-box input{
width:100%;
background:none;
border:none;
outline:none;
color:white;
font-size:16px;
}

.search-box input::placeholder{
color:#94a3b8;
}

.stat{

background:rgba(255,255,255,0.06);
backdrop-filter:blur(20px);
border:1px solid rgba(255,255,255,0.08);
padding:22px 28px;
border-radius:28px;
display:flex;
align-items:center;
font-weight:600;
color:#e2e8f0;
box-shadow:0 15px 35px rgba(0,0,0,0.25);

}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(380px,1fr));
gap:28px;
}

.card{

background:rgba(10,15,30,0.72);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.08);
border-radius:35px;
padding:28px;
position:relative;
overflow:hidden;
transition:0.4s;
cursor:pointer;
box-shadow:
0 15px 40px rgba(0,0,0,0.35);

}

.card:hover{

transform:
translateY(-10px)
scale(1.01);

border-color:rgba(0,255,213,0.4);

box-shadow:
0 25px 60px rgba(0,0,0,0.45),
0 0 40px rgba(0,255,213,0.15);

}

.card::before{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:
linear-gradient(
135deg,
rgba(255,255,255,0.05),
transparent 40%
);
pointer-events:none;
}

.card::after{
content:'';
position:absolute;
top:-70px;
right:-70px;
width:180px;
height:180px;
background:
radial-gradient(circle,
rgba(0,255,213,0.16),
transparent 70%);
}

.company{
font-size:24px;
font-weight:700;
line-height:1.4;
margin-bottom:18px;
position:relative;
z-index:2;
}

.company::after{
content:'';
display:block;
width:90px;
height:4px;
margin-top:12px;
border-radius:20px;
background:linear-gradient(90deg,#00ffd5,transparent);
}

.row{
margin-bottom:12px;
line-height:1.7;
font-size:14px;
word-break:break-word;
position:relative;
z-index:2;
color:#dbeafe;
}

.label{
color:#00ffd5;
font-weight:600;
}

.pagination{
display:flex;
justify-content:center;
gap:12px;
margin-top:45px;
flex-wrap:wrap;
}

.btn{
background:rgba(255,255,255,0.06);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.08);
color:white;
padding:13px 18px;
border-radius:18px;
cursor:pointer;
transition:0.3s;
}

.btn:hover,
.active{
background:linear-gradient(135deg,#00ffd5,#00a2ff);
color:black;
font-weight:700;
box-shadow:0 0 30px rgba(0,255,213,0.25);
}

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,0.88);
backdrop-filter:blur(10px);
display:none;
justify-content:center;
align-items:center;
padding:20px;
z-index:99999;
}

.modal-content{
width:100%;
max-width:1300px;
max-height:92vh;
overflow:auto;
background:
linear-gradient(
180deg,
rgba(15,23,42,0.95),
rgba(2,6,23,0.96)
);
border-radius:35px;
padding:35px;
border:1px solid rgba(255,255,255,0.08);
backdrop-filter:blur(20px);
position:relative;
box-shadow:
0 25px 60px rgba(0,0,0,0.5);
}

.close{
position:absolute;
top:18px;
right:28px;
font-size:40px;
color:#ff4d4d;
cursor:pointer;
transition:0.3s;
}

.close:hover{
transform:rotate(90deg);
}

.section{
margin-top:35px;
}

.section-title{
font-size:24px;
margin-bottom:18px;
color:#00ffd5;
font-weight:700;
}

.box{
background:rgba(255,255,255,0.03);
border:1px solid rgba(255,255,255,0.06);
padding:22px;
border-radius:24px;
margin-bottom:18px;
line-height:1.8;
backdrop-filter:blur(10px);
}

.loading{
text-align:center;
padding:120px 20px;
font-size:22px;
color:#cbd5e1;
}

::-webkit-scrollbar{
width:10px;
}

::-webkit-scrollbar-thumb{
background:linear-gradient(#00ffd5,#00a2ff);
border-radius:20px;
}

@media(max-width:768px){

.logo{
font-size:36px;
}

.subtitle{
font-size:13px;
letter-spacing:2px;
}

.grid{
grid-template-columns:1fr;
}

.topbar{
flex-direction:column;
}

.hero{
padding:35px 20px;
}

}

</style>
</head>
