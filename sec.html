<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>Security</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:#020617;
    height:100vh;
    overflow:hidden;
}

.bg{
    position:absolute;
    inset:0;
    background:
    radial-gradient(circle at top left,#2563eb55,transparent 30%),
    radial-gradient(circle at bottom right,#7c3aed55,transparent 30%),
    #020617;
}

.overlay{
    position:fixed;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    backdrop-filter:blur(8px);
}

.box{
    width:350px;
    background:#0f172aee;
    border-radius:24px;
    padding:35px;
    color:white;
    border:1px solid rgba(255,255,255,.08);
}

.logo{
    width:70px;
    height:70px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    border-radius:20px;
    display:flex;
    justify-content:center;
    align-items:center;
    margin:auto;
    margin-bottom:20px;
    font-size:30px;
}

h2{
    text-align:center;
    margin-bottom:10px;
}

p{
    text-align:center;
    opacity:.7;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    border:none;
    outline:none;
    border-radius:14px;
    background:#1e293b;
    color:white;
    margin-bottom:18px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:14px;
    background:linear-gradient(135deg,#2563eb,#7c3aed);
    color:white;
    cursor:pointer;
}

.error{
    text-align:center;
    margin-top:15px;
    color:#f87171;
    display:none;
}

</style>
</head>
<body>

<div class="bg"></div>

<div class="overlay">

    <div class="box">

        <div class="logo">
            🔒
        </div>

        <h2>Secure Login</h2>

        <p>Enter password</p>

        <input
            type="password"
            id="password"
            placeholder="Password"
        >

        <button onclick="login()">
            Unlock Access
        </button>

        <div class="error" id="error">
            Wrong password
        </div>

    </div>

</div>
