<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XMINE TAMBANG DATABASE</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#030712;
    color:#fff;
    font-family:'Poppins',sans-serif;
    overflow-x:hidden;
}

body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
    radial-gradient(circle at top left,#00ffd520,transparent 30%),
    radial-gradient(circle at bottom right,#0066ff20,transparent 30%);
    z-index:-1;
}

.header{
    padding:40px 20px 20px;
    text-align:center;
}

.logo{
    font-size:38px;
    font-weight:700;
    background:linear-gradient(90deg,#00ffd5,#00a2ff);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.sub{
    color:#94a3b8;
    margin-top:10px;
    font-size:15px;
}

.search-wrap{
    width:100%;
    max-width:950px;
    margin:25px auto;
    padding:0 20px;
}

.search-box{
    display:flex;
    gap:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    backdrop-filter:blur(10px);
    border-radius:18px;
    padding:14px;
    box-shadow:0 10px 40px rgba(0,0,0,0.35);
}

.search-box input{
    flex:1;
    background:transparent;
    border:none;
    outline:none;
    color:#fff;
    font-size:16px;
    padding:14px;
}

.search-box button{
    border:none;
    background:linear-gradient(90deg,#00ffd5,#00a2ff);
    color:#000;
    font-weight:700;
    padding:14px 24px;
    border-radius:14px;
    cursor:pointer;
    transition:.2s;
}

.search-box button:hover{
    transform:scale(1.04);
}

.quick{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:18px;
}

.quick button{
    background:rgba(255,255,255,0.06);
    color:#fff;
    border:1px solid rgba(255,255,255,0.08);
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
    transition:.2s;
}

.quick button:hover{
    background:#00ffd5;
    color:#000;
}

.stats{
    max-width:1200px;
    margin:20px auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:18px;
}

.card-stat{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    padding:24px;
    border-radius:22px;
    backdrop-filter:blur(12px);
}

.card-stat h2{
    font-size:32px;
    margin-top:8px;
    color:#00ffd5;
}

.card-stat p{
    color:#94a3b8;
    font-size:14px;
}

.results{
    max-width:1200px;
    margin:30px auto 80px;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:22px;
}

.card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:24px;
    padding:22px;
    backdrop-filter:blur(14px);
    transition:.2s;
    position:relative;
    overflow:hidden;
}

.card:hover{
    transform:translateY(-4px);
    border-color:#00ffd5;
}

.badge{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:8px 14px;
    border-radius:999px;
    background:#00ffd520;
    color:#00ffd5;
    font-size:13px;
    margin-bottom:16px;
}

.company{
    font-size:20px;
    line-height:1.5;
    font-weight:600;
    margin-bottom:16px;
}

.info{
    margin-top:12px;
}

.label{
    color:#00ffd5;
    font-size:13px;
    margin-bottom:6px;
}

.value{
    color:#e2e8f0;
    line-height:1.7;
    font-size:14px;
    word-break:break-word;
}

.empty{
    text-align:center;
    color:#94a3b8;
    padding:80px 20px;
}

.loading{
    text-align:center;
    padding:80px 20px;
    color:#00ffd5;
    font-size:18px;
}

.footer{
    text-align:center;
    color:#64748b;
    padding:40px 20px;
    border-top:1px solid rgba(255,255,255,0.08);
}

@media(max-width:768px){

    .logo{
        font-size:28px;
    }

    .search-box{
        flex-direction:column;
    }

    .search-box button{
        width:100%;
    }

}
</style>
</head>
<body>

<div class="header">
    <div class="logo">XMINE DATABASE AHU</div>
    <div class="sub">
        Sistem Pencarian Database Perusahaan Tambang Indonesia
    </div>
</div>

<div class="search-wrap">

    <div class="search-box">
        <input
            type="text"
            id="searchInput"
            placeholder="Cari perusahaan, alamat, telepon..."
        >

        <button onclick="searchData()">
            SEARCH
        </button>
    </div>

    <div class="quick">
        <button onclick="loadKeyword('emas')">EMAS</button>
        <button onclick="loadKeyword('nikel')">NIKEL</button>
        <button onclick="loadKeyword('batubara')">BATUBARA</button>
		<button onclick="loadKeyword('alumunium')">ALUMUNIUM</button>
        <button onclick="loadKeyword('perak')">PERAK</button>
        <button onclick="loadKeyword('tembaga')">TEMBAGA</button>
        <button onclick="loadKeyword('timah')">TIMAH</button>
    </div>

</div>

<div class="stats">

    <div class="card-stat">
        <p>Total Database</p>
        <h2 id="totalData">0</h2>
    </div>

    <div class="card-stat">
        <p>Total Hasil</p>
        <h2 id="totalResult">0</h2>
    </div>

</div>

<div id="results" class="results">

    <div class="empty">
        Pilih keyword tambang atau lakukan pencarian
    </div>

</div>

<div class="footer">
    XMINE ULTRA VIP DATABASE ENGINE
</div>

<script>

// =========================================
// JSON FILES
// =========================================

const FILES = {

    emas:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/emas.json',
	
	perak:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/perak.json',

    nikel:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/nikel.json',

	alumunium:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/alumunium.json',
	
    batubara:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/batubara.json',

    tembaga:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/tembaga.json',

    timah:
    'https://raw.githubusercontent.com/XMINETRADER/vip/refs/heads/main/tambang/timah.json'

};

let DATABASE = [];
let FILTERED = [];

// =========================================
// LOAD KEYWORD JSON
// =========================================

async function loadKeyword(keyword){

    const results = document.getElementById('results');

    results.innerHTML = `
        <div class="loading">
            Loading ${keyword}.json ...
        </div>
    `;

    try{

        const url = FILES[keyword];

        const res = await fetch(url);

        DATABASE = await res.json();

        FILTERED = DATABASE;

        document.getElementById(
            'totalData'
        ).innerText = DATABASE.length;

        document.getElementById(
            'totalResult'
        ).innerText = FILTERED.length;

        renderData(FILTERED);

    }catch(err){

        console.log(err);

        results.innerHTML = `
            <div class="empty">
                Gagal load database
            </div>
        `;

    }

}

// =========================================
// SEARCH
// =========================================

function searchData(){

    const q = document
        .getElementById('searchInput')
        .value
        .toLowerCase()
        .trim();

    if(!q){

        renderData(DATABASE);

        return;

    }

    FILTERED = DATABASE.filter(item => {

        return JSON.stringify(item)
        .toLowerCase()
        .includes(q);

    });

    document.getElementById(
        'totalResult'
    ).innerText = FILTERED.length;

    renderData(FILTERED);

}

// =========================================
// ENTER SEARCH
// =========================================

const input = document.getElementById(
    'searchInput'
);

input.addEventListener('keydown', e => {

    if(e.key === 'Enter'){
        searchData();
    }

});

// =========================================
// RENDER
// =========================================

function renderData(data){

    const results = document.getElementById('results');

    if(data.length === 0){

        results.innerHTML = `
            <div class="empty">
                Data tidak ditemukan
            </div>
        `;

        return;

    }

    results.innerHTML = data.map(item => `

        <div class="card">

            <div class="badge">
                ⛏ ${item.keyword || 'TAMBANG'}
            </div>

            <div class="company">
                ${item.nama_perusahaan || '-'}
            </div>

            <div class="info">
                <div class="label">📍 ALAMAT</div>
                <div class="value">
                    ${item.alamat || '-'}
                </div>
            </div>

            <div class="info">
                <div class="label">📞 TELEPON</div>
                <div class="value">
                    ${item.telepon || '-'}
                </div>
            </div>

            

        </div>

    `).join('');

}

</script>

</body>
</html>
